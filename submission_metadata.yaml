ai_usage_summary: |
  Used Gemini 3.5 Flash (Medium) as a pairing partner for architectural design, code generation, and debugging.
  No candidate data was uploaded to external APIs during ranking.

methodology_summary: |
  A two-stage candidate ranking system utilizing FAISS dense vector retrieval (all-MiniLM-L6-v2) for Stage 1. 
  Stage 2 employs a 7-factor re-ranking scoring framework: Semantic Similarity (35%), Skill Match (20%), 
  Experience Match (15%), Project Relevance (10%), Behavioral Signals (10%), Education Match (5%), 
  and Profile Quality (5%). Major inconsistencies (job duration anomalies, expert skills with 0 duration) 
  are detected and penalized to ensure a 0% honeypot rate. Deterministic tie-breaking is handled via 
  candidate_id ascending. The entire online ranking pipeline runs in under 10 seconds on CPU.

declarations:
